name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Electron app (Windows)
        run: npm run make

      - name: Find and rename installer
        run: |
          $exe = Get-ChildItem -Path .\out\make\squirrel.windows\x64\*.exe -ErrorAction Stop | Select-Object -First 1
          $target = ".\out\make\squirrel.windows\x64\AgentMaestroDesktop-${{ github.event.inputs.version }}.exe"
          Rename-Item $exe.FullName $target
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.inputs.version }}
          tag_name: ${{ github.event.inputs.version }}
          files: out/make/squirrel.windows/x64/AgentMaestroDesktop-${{ github.event.inputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
